name: Build Firmware

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'include/config.h'
      - 'platformio.ini'
      - 'partitions.csv'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract VoltMon version from config.h
        id: voltmon_version
        run: |
          VERSION=$(grep '#define VOLTMON_VERSION' include/config.h | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VoltMon version: $VERSION"

      - name: Extract Collector version from config.h
        id: collector_version
        run: |
          VERSION=$(grep '#define COLLECTOR_VERSION' include/config.h | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Collector version: $VERSION"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: platformio-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Create secrets.h from template
        run: |
          cp include/secrets.h.template include/secrets.h
          sed -i 's/"network1"/"placeholder"/' include/secrets.h
          sed -i 's/"password1"/"placeholder"/' include/secrets.h
          sed -i 's/"your_aio_username"/"placeholder"/' include/secrets.h
          sed -i 's/"your_aio_key"/"placeholder"/' include/secrets.h
          sed -i 's/"your_google_script_url"/"placeholder"/' include/secrets.h
          sed -i 's/"phonenumber@carrier_gateway.com"/"placeholder"/' include/secrets.h

      - name: Build VoltMon firmware
        run: platformio run -e esp32-c3-devkitm-1

      - name: Build Collector firmware
        run: platformio run -e voltmon-collector

      - name: Copy firmware to release folders
        run: |
          mkdir -p firmware/voltmon
          mkdir -p firmware/collector
          cp .pio/build/esp32-c3-devkitm-1/firmware.bin firmware/voltmon/firmware.bin
          echo "${{ steps.voltmon_version.outputs.version }}" > firmware/voltmon/version.txt
          cp .pio/build/esp32-c3-devkitm-1/firmware.bin firmware/firmware.bin
          echo "${{ steps.voltmon_version.outputs.version }}" > firmware/version.txt
          cp .pio/build/voltmon-collector/firmware.bin firmware/collector/firmware.bin
          echo "${{ steps.collector_version.outputs.version }}" > firmware/collector/version.txt

      - name: Commit firmware files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/jktightwad/esp32-Parasitic-Drain-Monitor.git
          git add firmware/voltmon/firmware.bin firmware/voltmon/version.txt
          git add firmware/collector/firmware.bin firmware/collector/version.txt
          git diff --staged --quiet || git commit -m "firmware: voltmon=${{ steps.voltmon_version.outputs.version }} collector=${{ steps.collector_version.outputs.version }}"
          git push